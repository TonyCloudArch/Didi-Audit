services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: didi_audit
      MYSQL_ROOT_PASSWORD: audit_root_pass
      MYSQL_USER: audit_user
      MYSQL_PASSWORD: audit_user_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    restart: always
    ports:
      - "3001:3001"
    environment:
      - DB_HOST=db
      - DB_USER=audit_user
      - DB_PASSWORD=audit_user_pass
      - DB_NAME=didi_audit
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - db

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:3001

volumes:
  db_data:
